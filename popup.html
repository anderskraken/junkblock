<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="popup__header">
      <h1 class="popup__title">JunkBlock</h1>
      <span class="popup__subtitle">UPF-markører</span>
    </header>

    <div id="categories" class="popup__categories"></div>

    <div class="popup__section">
      <h2 class="popup__section-title">Egne markører</h2>
      <div id="custom-markers" class="popup__custom-list"></div>
      <div class="popup__add-row">
        <input type="text" id="add-marker-input" class="popup__input" placeholder="Legg til markør...">
        <button id="add-marker-btn" class="popup__btn popup__btn--add">+</button>
      </div>
    </div>

    <button id="reset-btn" class="popup__btn popup__btn--reset">Tilbakestill til standard</button>
  </div>

  <script src="upf-rules.js"></script>
  <script src="popup.js"></script>
</body>
</html>
